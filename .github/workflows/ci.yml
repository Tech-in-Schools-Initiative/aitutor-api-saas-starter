name: CI

on:
  push:
    branches: [develop, main]
  pull_request:

env:
  AUTH_SECRET: ci-test-secret-not-for-production-please-change
  STRIPE_SECRET_KEY: sk_test_dummy_key_for_ci_00000000000000000000
  STRIPE_WEBHOOK_SECRET: whsec_dummy_for_ci_0000000000000000000000
  NEXT_PUBLIC_STRIPE_PUBLISHABLEKEY: pk_test_dummy_key_for_ci_0000000000000
  BASE_URL: http://localhost:3000
  AITUTOR_API_KEY: ci-dummy-aitutor-key
  WORKFLOW_ID: ci-dummy-workflow-id
  CHATBOT_ID: ci-dummy-chatbot-id
  NEXT_PUBLIC_AITUTOR_TOKEN: ci-dummy-aitutor-token
  POSTGRES_URL: postgres://postgres:postgres@localhost:5432/postgres

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run database migrations
        run: pnpm db:migrate
      - name: Type check
        run: pnpm --filter web exec tsc --noEmit && pnpm --filter @repo/ui exec tsc --noEmit && pnpm --filter @repo/db exec tsc --noEmit && pnpm --filter @repo/email exec tsc --noEmit
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run database migrations
        run: pnpm db:migrate
      - name: Seed database (test fixtures only, no Stripe)
        run: pnpm db:seed:test
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm test:e2e
